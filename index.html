<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hours Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f3f4f6;color:#111;min-height:100vh}
.topbar{background:#1D4E4F;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{color:#fff;font-size:17px;font-weight:600}
.topbar-tabs{display:flex;gap:6px}
.tab{padding:6px 18px;border-radius:999px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit}
.tab-active{background:#FFE101;color:#1a1a1a}
.tab-inactive{background:rgba(255,255,255,.15);color:rgba(255,255,255,.85)}
.content{padding:20px 24px;max-width:1100px;margin:0 auto}
.toolbar{background:#fff;border-radius:12px;border:.5px solid #e5e7eb;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.week-nav{display:flex;align-items:center;gap:8px}
.nav-btn{width:28px;height:28px;border-radius:50%;border:.5px solid #d1d5db;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#6b7280}
.nav-btn:hover{background:#f3f4f6}
.week-label{font-size:13px;font-weight:500;color:#111;white-space:nowrap}
.vdiv{width:1px;height:24px;background:#e5e7eb}
.person-sel{font-size:13px;padding:6px 10px;border-radius:8px;border:.5px solid #d1d5db;color:#111;background:#fff;font-family:inherit;cursor:pointer}
.btn{padding:7px 14px;border-radius:999px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}
.btn-yellow{background:#FFE101;color:#1a1a1a}
.btn-dark{background:#1D4E4F;color:#fff}
.btn-gray{background:#e5e7eb;color:#374151}
.btn-red{background:#fecaca;color:#991b1b}
.btn-green{background:#bbf7d0;color:#166534}
.week-card{background:#fff;border-radius:12px;border:.5px solid #e5e7eb;padding:16px 20px;margin-bottom:14px}
.week-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:.5px solid #f0f0f0}
.week-title{font-size:15px;font-weight:600;color:#111;margin-bottom:4px}
.hours-badge{display:inline-block;font-size:12px;font-weight:500;padding:3px 10px;border-radius:999px}
.hours-green{background:#d1fae5;color:#065f46}
.hours-yellow{background:#fef9c3;color:#854d0e}
.hours-red{background:#fee2e2;color:#991b1b}
.bulk-btns{display:flex;gap:4px}
.bulk-btn{width:24px;height:24px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.proj-label{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.proj-badge{background:#f3f4f6;color:#6b7280;font-size:11px;padding:2px 8px;border-radius:999px;text-transform:none;letter-spacing:0;font-weight:400}
.tasks-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.task-card{border-radius:8px;border:.5px solid;padding:8px 10px;min-width:110px;max-width:180px}
.task-pending{background:#f9fafb;border-color:#e5e7eb}
.task-ok{background:#f0fdf4;border-color:#86efac}
.task-nok{background:#fff1f2;border-color:#fca5a5}
.task-stuck{background:#fffbeb;border-color:#fcd34d}
.task-h{font-size:11px;font-weight:600;margin-bottom:3px}
.task-pending .task-h{color:#6b7280}
.task-ok .task-h{color:#15803d}
.task-nok .task-h{color:#be123c}
.task-stuck .task-h{color:#b45309}
.task-name{font-size:12px;color:#374151;margin-bottom:6px;line-height:1.35}
.task-actions{display:flex;gap:3px;align-items:center}
.ta-btn{width:20px;height:20px;border-radius:5px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.ta-ok{background:#bbf7d0;color:#166534}
.ta-ok.active{background:#16a34a;color:#fff}
.ta-nok{background:#fecaca;color:#991b1b}
.ta-nok.active{background:#dc2626;color:#fff}
.ta-stuck{background:#fde68a;color:#92400e}
.ta-stuck.active{background:#d97706;color:#fff}
.ta-del{background:#f3f4f6;color:#9ca3af;margin-left:auto}
.ta-del:hover{background:#fee2e2;color:#dc2626}
.empty-week{text-align:center;padding:24px;color:#9ca3af;font-size:13px}
.dash-card{background:#fff;border-radius:12px;border:.5px solid #e5e7eb;padding:20px 24px;margin-bottom:16px}
.dash-card h3{font-size:15px;font-weight:600;color:#111;margin-bottom:16px}
.period-btns{display:flex;gap:6px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.period-btn{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;border:.5px solid #d1d5db;background:#fff;cursor:pointer;font-family:inherit}
.period-btn.active{background:#1D4E4F;color:#fff;border-color:#1D4E4F}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:640px){.charts-grid{grid-template-columns:1fr}}
.chart-wrap{background:#f9fafb;border-radius:8px;padding:16px;position:relative}
.chart-title{font-size:13px;font-weight:600;color:#374151;margin-bottom:12px}
.chart-legend{margin-top:10px;display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280}
.legend-dot{width:10px;height:10px;border-radius:2px}

/* Project rows with hover breakdown */
.proj-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f9fafb;border-radius:8px;margin-bottom:6px;font-size:13px;cursor:default;position:relative;transition:background .15s}
.proj-row:hover{background:#f0fdf4}
.proj-row-expand{display:none;padding:8px 12px 10px 12px;background:#f0fdf4;border-radius:0 0 8px 8px;margin-top:-6px;margin-bottom:6px;border:.5px solid #bbf7d0;border-top:none}
.proj-row-expand.open{display:block}
.proj-breakdown{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.pb-chip{display:flex;align-items:center;gap:6px;background:#fff;border:.5px solid #d1fae5;border-radius:999px;padding:3px 10px 3px 6px;font-size:12px;color:#065f46}
.pb-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;border:.5px solid #bbf7d0}
.pb-avatar-init{width:20px;height:20px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#065f46}
.proj-row-info{font-size:11px;color:#6b7280;display:flex;align-items:center;gap:4px}

/* Podium top 3 */
.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:12px;padding:8px 0 16px}
.podium-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.podium-avatar{border-radius:50%;object-fit:cover;border:3px solid #e5e7eb;display:block}
.podium-avatar-init{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;color:#6b7280;border:3px solid #e5e7eb;flex-shrink:0}
.podium-name{font-size:13px;font-weight:600;color:#111;text-align:center;max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podium-hours{font-size:12px;color:#6b7280;text-align:center}
.podium-ok{font-size:11px;font-weight:600;color:#16a34a;text-align:center}
.podium-block{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;width:80px}
.podium-1 .podium-avatar,.podium-1 .podium-avatar-init{border-color:#FBBF24;width:72px;height:72px;font-size:24px}
.podium-2 .podium-avatar,.podium-2 .podium-avatar-init{border-color:#94A3B8;width:60px;height:60px;font-size:20px}
.podium-3 .podium-avatar,.podium-3 .podium-avatar-init{border-color:#FB923C;width:54px;height:54px;font-size:18px}
.podium-block-1{background:#FEF9C3;color:#D97706;height:80px}
.podium-block-2{background:#F1F5F9;color:#64748B;height:60px}
.podium-block-3{background:#FFF7ED;color:#C2410C;height:44px}

/* Chart tooltip */
.chart-tooltip{position:absolute;background:#1a1a1a;color:#fff;font-size:11px;padding:8px 10px;border-radius:8px;pointer-events:none;display:none;z-index:20;max-width:200px;line-height:1.6;white-space:nowrap}
.tt-title{font-weight:600;margin-bottom:4px;font-size:12px}
.tt-row{display:flex;align-items:center;gap:6px}
.tt-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

table{width:100%;font-size:13px;border-collapse:collapse}
th{background:#f3f4f6;padding:8px 12px;text-align:left;font-weight:600;color:#374151;font-size:12px}
td{padding:8px 12px;border-bottom:.5px solid #f0f0f0;color:#374151}
.badge-stuck{background:#fef9c3;color:#92400e;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
.badge-resolved{background:#f3f4f6;color:#6b7280;font-size:11px;padding:2px 8px;border-radius:999px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;position:relative}
.modal h2{font-size:18px;font-weight:600;margin-bottom:18px;color:#111}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#6b7280;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border-radius:8px;border:.5px solid #d1d5db;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#111}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1D4E4F;box-shadow:0 0 0 2px rgba(29,78,79,.12)}
.field textarea{min-height:80px;resize:vertical}
.modal-footer{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.close-x{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#9ca3af;line-height:1}
.manage-list{max-height:180px;overflow-y:auto;border:.5px solid #e5e7eb;border-radius:8px;margin-bottom:12px}
.manage-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-size:13px;border-bottom:.5px solid #f0f0f0}
.manage-item:last-child{border-bottom:none}
.toast{position:fixed;bottom:24px;right:24px;background:#1D4E4F;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none}
.toast.show{opacity:1}
#loading{position:fixed;inset:0;background:#f3f4f6;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;font-size:14px;color:#6b7280;gap:12px}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#1D4E4F;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div>A carregar...</div></div>

<div class="topbar">
  <div class="topbar-title">2026 P&O Week Planner</div>
  <div class="topbar-tabs">
    <button class="tab tab-active" id="tab-planner" onclick="setTab('planner')">Planner</button>
    <button class="tab tab-inactive" id="tab-dashboard" onclick="setTab('dashboard')">Dashboard</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="view-planner" class="content">
  <div class="toolbar">
    <div class="week-nav">
      <button class="nav-btn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-label" id="week-label">—</span>
      <button class="nav-btn" onclick="shiftWeek(1)">›</button>
    </div>
    <div class="vdiv"></div>
    <select class="person-sel" id="person-sel"></select>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-dark" onclick="openManage('person')">+ Pessoa</button>
      <button class="btn btn-dark" onclick="openManage('project')">+ Projeto</button>
      <button class="btn btn-yellow" onclick="openNewEntry()">+ Nova entrada</button>
    </div>
  </div>
  <div id="planner-body"></div>
</div>

<div id="view-dashboard" class="content" style="display:none">
  <div class="dash-card">
    <div class="period-btns">
      <span style="font-size:13px;font-weight:500;color:#374151;margin-right:4px">Período:</span>
      <button class="period-btn active" onclick="setPeriod('week',this)">Semana</button>
      <button class="period-btn" onclick="setPeriod('month',this)">Mês</button>
      <button class="period-btn" onclick="setPeriod('year',this)">Ano</button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <button class="nav-btn" onclick="shiftDash(-1)">‹</button>
        <span id="dash-period-label" style="font-size:13px;font-weight:500;color:#111;white-space:nowrap"></span>
        <button class="nav-btn" onclick="shiftDash(1)">›</button>
      </div>
    </div>
    <div class="charts-grid">
      <div class="chart-wrap">
        <div class="chart-title">Horas reportadas</div>
        <div style="position:relative;width:100%;height:180px"><canvas id="chart-hours" role="img" aria-label="Horas reportadas por período"></canvas></div>
        <div class="chart-legend" id="legend-hours"></div>
        <div class="chart-tooltip" id="tt-hours"></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">OK Rate</div>
        <div style="position:relative;width:100%;height:180px"><canvas id="chart-ok" role="img" aria-label="Taxa de tarefas OK por período"></canvas></div>
        <div class="chart-legend" id="legend-ok"></div>
        <div class="chart-tooltip" id="tt-ok"></div>
      </div>
    </div>

    <h3 style="margin-bottom:12px">Horas por projeto</h3>
    <div id="dash-projects"></div>

    <h3 style="margin:20px 0 12px">Ranking de pessoas</h3>
    <div id="dash-ranking"></div>
  </div>
  <div class="dash-card">
    <h3>Stucks</h3>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:14px;cursor:pointer">
      <input type="checkbox" id="show-resolved" onchange="renderDash()"> Mostrar resolvidos
    </label>
    <div style="overflow-x:auto">
      <table><thead><tr><th>Status</th><th>Pessoa</th><th>Projeto</th><th>Semana</th><th>Razão</th><th>Ação</th></tr></thead>
      <tbody id="stucks-body"></tbody></table>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-entry">
  <div class="modal">
    <button class="close-x" onclick="closeModal('modal-entry')">×</button>
    <h2>Nova entrada</h2>
    <div class="field"><label>Pessoa</label><select id="f-person"></select></div>
    <div class="field"><label>Projeto</label><select id="f-project"></select></div>
    <div class="field"><label>Semana (segunda-feira)</label><input type="date" id="f-week"></div>
    <div class="field"><label>Horas totais</label><input type="number" step="0.5" min="0" id="f-hours" placeholder="ex: 8"></div>
    <div class="field"><label>Tarefas (uma por linha)</label><textarea id="f-desc" placeholder="Tarefa A&#10;Tarefa B&#10;Tarefa C"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modal-entry')">Cancelar</button>
      <button class="btn btn-dark" onclick="saveEntry(false)">Guardar e adicionar</button>
      <button class="btn btn-yellow" onclick="saveEntry(true)">Guardar e fechar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-stuck">
  <div class="modal" style="max-width:380px">
    <button class="close-x" onclick="closeModal('modal-stuck')">×</button>
    <h2>Porquê está stuck?</h2>
    <div class="field"><label>Razão</label><textarea id="stuck-reason" placeholder="Descreve o bloqueio..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modal-stuck')">Cancelar</button>
      <button class="btn btn-yellow" onclick="confirmStuck()">Marcar stuck</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-resolve">
  <div class="modal" style="max-width:340px">
    <button class="close-x" onclick="closeModal('modal-resolve')">×</button>
    <h2>Resolver stuck?</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:18px">Esta tarefa vai ser marcada como OK.</p>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modal-resolve')">Cancelar</button>
      <button class="btn btn-green" onclick="confirmResolve()">Resolver</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-manage">
  <div class="modal" style="max-width:360px">
    <button class="close-x" onclick="closeModal('modal-manage')">×</button>
    <h2 id="manage-title">Gerir</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="manage-input" style="flex:1;padding:7px 10px;border-radius:8px;border:.5px solid #d1d5db;font-size:13px;font-family:inherit">
      <button class="btn btn-dark" onclick="addManageItem()">Adicionar</button>
    </div>
    <div class="manage-list" id="manage-list"></div>
    <div class="modal-footer"><button class="btn btn-gray" onclick="closeModal('modal-manage')">Fechar</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-delete">
  <div class="modal" style="max-width:320px">
    <button class="close-x" onclick="closeModal('modal-delete')">×</button>
    <h2>Confirmar eliminação</h2>
    <p id="delete-msg" style="font-size:13px;color:#6b7280;margin-bottom:18px"></p>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modal-delete')">Cancelar</button>
      <button class="btn btn-red" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://fugydgbujpldycpodhac.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1Z3lkZ2J1anBsZHljcG9kaGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTc0NjcsImV4cCI6MjA5NzE5MzQ2N30.53ef93SQ55a0vW46_qx-SIcdy7x4e9cVCZ0kCiz7Br4';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const AVATAR_BUCKET = 'avatars_ops';
// Map person names to photo filenames (lowercase, normalized)
const AVATAR_MAP = {
  'afonso bento':     'afonso-bento.jpg',
  'andre faria':      'andre-faria.jpg',
  'andré faria':      'andre-faria.jpg',
  'david pereira':    'david-pereira.png',
  'joao m pires':     'joao-m-pires.jpg',
  'joao m. pires':    'joao-m-pires.jpg',
  'joão m pires':     'joao-m-pires.jpg',
  'joão m. pires':    'joao-m-pires.jpg',
  'pedro sacramento': 'pedro-sacramento.jpg',
  'sara diniz':       'sara-diniz.jpg',
  'vasco laranjinha': 'vasco-laranjinha.jpg',
};
function avatarUrl(name) {
  const key = name.toLowerCase().normalize('NFC');
  const file = AVATAR_MAP[key];
  if (!file) return null;
  return `${SUPABASE_URL}/storage/v1/object/public/${AVATAR_BUCKET}/${file}`;
}
function initials(name) {
  return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function avatarTag(name, size=20, extraStyle='') {
  const url = avatarUrl(name);
  if (url) return `<img src="${url}" alt="${esc(name)}" class="pb-avatar" style="width:${size}px;height:${size}px${extraStyle?';'+extraStyle:''}" onerror="this.replaceWith(mkInit('${esc(name)}',${size}))">`;
  return `<div class="pb-avatar-init" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px${extraStyle?';'+extraStyle:''}">${esc(initials(name))}</div>`;
}
window.mkInit = function(name, size) {
  const d = document.createElement('div');
  d.className = 'pb-avatar-init';
  d.style.cssText = `width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px`;
  d.textContent = initials(name);
  return d;
};

// ── STATE ──
let records = [], people = [], projects = [];
let selectedWeek = mondayOf(new Date());
let activeTab = 'planner';
let dashPeriod = 'week';
let dashWeek = mondayOf(new Date());
let dashMonth = fmtYM(new Date());
let dashYear = new Date().getFullYear();
let pendingStuck = null, pendingResolve = null, pendingDelete = null, manageType = null;
let chartHours = null, chartOk = null;

// ── DATE UTILS ──
function mondayOf(d) {
  const dt = typeof d === 'string' ? parseLocalDate(d) : new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return dt;
}
function parseLocalDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function fmtYM(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function weekNum(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dn = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - dn);
  const ys = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - ys) / 86400000) + 1) / 7);
}
function weekLabel(d) {
  const mon = mondayOf(d);
  const fri = new Date(mon); fri.setDate(fri.getDate() + 4);
  const fmt = dt => dt.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' });
  return `W${weekNum(mon)} [${fmt(mon)} – ${fmt(fri)}]`;
}

// ── INIT ──
async function init() {
  await Promise.all([loadLookups(), loadRecords()]);
  populatePersonSel();
  document.getElementById('f-week').value = fmtDate(mondayOf(new Date()));
  render();
  renderDash();
  document.getElementById('loading').style.display = 'none';
}

async function loadLookups() {
  const { data } = await sb.from('lookups').select('*').order('id');
  people   = data.filter(r => r.type === 'person').map(r => r.name);
  projects = data.filter(r => r.type === 'project').map(r => r.name);
}

async function loadRecords() {
  const { data } = await sb.from('records').select('*').order('created_at');
  records = (data || []).map(r => ({
    id: r.id,
    person: r.person,
    project: r.project,
    week: r.week,
    hours: parseFloat(r.hours),
    tasks: r.tasks || [],
    taskStatus: r.task_status || [],
    taskReasons: r.task_reasons || []
  }));
}

}
function setLoading(on) {

}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function populatePersonSel() {

// ── PLANNER ──
window.shiftWeek = n => {
  selectedWeek = new Date(selectedWeek);
  selectedWeek.setDate(selectedWeek.getDate() + n * 7);
  render();
};

function render() {
  const person = document.getElementById('person-sel').value;
  if (!person) return;
  document.getElementById('week-label').textContent = weekLabel(selectedWeek);
  let html = '';
  for (let w = 0; w < 2; w++) {
    const wDate = new Date(selectedWeek);
    wDate.setDate(wDate.getDate() - (1 - w) * 7);
    const wMon  = mondayOf(wDate);
    const wStr  = fmtDate(wMon);
    const recs = records.filter(r => {
      const recMon = fmtDate(mondayOf(parseLocalDate(r.week)));
      return r.person === person && recMon === wStr;
    });
    const total = recs.reduce((s, r) => s + r.hours, 0);
    const pct   = (total / 40 * 100).toFixed(1);
    const hCls  = total >= 39 ? 'hours-green' : total >= 35 ? 'hours-yellow' : 'hours-red';
    const over  = total > 40 ? `<span style="color:#dc2626;font-size:11px;margin-left:6px">(+${(total-40).toFixed(1)}h)</span>` : '';
    html += `<div class="week-card"><div class="week-header"><div>
      <div class="week-title">${weekLabel(wMon)}</div>
      <span class="hours-badge ${hCls}">${total.toFixed(1)}h (${pct}%)</span>${over}
    </div><div class="bulk-btns">
      <button class="bulk-btn" style="background:#d1fae5;color:#065f46" onclick="bulk('${esc(person)}','${wStr}','ok')">✓</button>
      <button class="bulk-btn" style="background:#fee2e2;color:#991b1b" onclick="bulk('${esc(person)}','${wStr}','nok')">✗</button>
      <button class="bulk-btn" style="background:#fef9c3;color:#92400e" onclick="bulk('${esc(person)}','${wStr}','stuck')">!</button>
    </div></div>`;
    if (!recs.length) {
      html += `<div class="empty-week">Sem entradas para esta semana</div>`;
    } else {
      const byProj = {};
      recs.forEach(r => { if (!byProj[r.project]) byProj[r.project] = []; byProj[r.project].push(r); });
      Object.entries(byProj).forEach(([proj, pRecs]) => {
        const ph = pRecs.reduce((s, r) => s + r.hours, 0);
        html += `<div class="proj-label">${esc(proj)}<span class="proj-badge">${ph.toFixed(1)}h</span></div><div class="tasks-grid">`;
        pRecs.forEach(rec => {
          rec.tasks.forEach((task, ti) => {
            const st  = rec.taskStatus[ti] || 'pending';
            const hpt = rec.tasks.length ? (rec.hours / rec.tasks.length).toFixed(1) : rec.hours;
            html += `<div class="task-card task-${st}">
              <div class="task-h">${hpt}h</div>
              <div class="task-name">${esc(task)}</div>
              <div class="task-actions">
                <button class="ta-btn ta-ok${st==='ok'?' active':''}"     onclick="setStatus(${rec.id},${ti},'ok')">✓</button>
                <button class="ta-btn ta-nok${st==='nok'?' active':''}"   onclick="setStatus(${rec.id},${ti},'nok')">✗</button>
                <button class="ta-btn ta-stuck${st==='stuck'?' active':''}" onclick="setStatus(${rec.id},${ti},'stuck')">!</button>
                <button class="ta-btn ta-del" onclick="askDeleteTask(${rec.id},${ti})">🗑</button>
              </div></div>`;
          });
        });
        html += `</div>`;
      });
    }
    html += `</div>`;
  }
  document.getElementById('planner-body').innerHTML = html;
}

// ── TASK ACTIONS ──
window.setStatus = async (id, ti, status) => {
  if (status === 'stuck') {
    pendingStuck = { id, ti };
    document.getElementById('stuck-reason').value = '';
    openModal('modal-stuck'); return;
  }
  const rec = records.find(r => r.id === id); if (!rec) return;
  const ts = [...rec.taskStatus]; ts[ti] = status;
  const tr = [...rec.taskReasons]; tr[ti] = '';
  setLoading(true);
  await sb.from('records').update({ task_status: ts, task_reasons: tr }).eq('id', id);
  await loadRecords(); setLoading(false); render();
  if (activeTab === 'dashboard') renderDash();
  showToast('Estado atualizado');
};

window.confirmStuck = async () => {
  const reason = document.getElementById('stuck-reason').value.trim();
  const { id, ti } = pendingStuck; closeModal('modal-stuck');
  const rec = records.find(r => r.id === id); if (!rec) return;
  const ts = [...rec.taskStatus]; ts[ti] = 'stuck';
  const tr = [...rec.taskReasons]; tr[ti] = reason;
  setLoading(true);
  await sb.from('records').update({ task_status: ts, task_reasons: tr }).eq('id', id);
  await loadRecords(); setLoading(false); render();
  if (activeTab === 'dashboard') renderDash();
  showToast('Marcado como stuck');
};

window.askDeleteTask = (id, ti) => {
  pendingDelete = { type: 'task', id, ti };
  document.getElementById('delete-msg').textContent = 'Tens a certeza que queres eliminar esta tarefa?';
  openModal('modal-delete');
};

window.confirmDelete = async () => {
  closeModal('modal-delete');
  const d = pendingDelete;
  if (d.type === 'task') {
    const rec = records.find(r => r.id === d.id); if (!rec) return;
    const tasks = [...rec.tasks]; tasks.splice(d.ti, 1);
    const ts = [...rec.taskStatus]; ts.splice(d.ti, 1);
    const tr = [...rec.taskReasons]; tr.splice(d.ti, 1);
    setLoading(true);
    if (!tasks.length) await sb.from('records').delete().eq('id', d.id);
    else await sb.from('records').update({ tasks, task_status: ts, task_reasons: tr }).eq('id', d.id);
    await loadRecords(); setLoading(false); render(); showToast('Tarefa eliminada');
  } else if (d.type === 'person') {
    await sb.from('lookups').delete().eq('type', 'person').eq('name', d.name);
    await loadLookups(); populatePersonSel(); renderManageList(); showToast('Eliminado');
  } else if (d.type === 'project') {
    await sb.from('lookups').delete().eq('type', 'project').eq('name', d.name);
    await loadLookups(); renderManageList(); showToast('Eliminado');
  }
};

window.bulk = async (person, week, status) => {
  setLoading(true);
  const recs = records.filter(r => r.person === person && fmtDate(mondayOf(parseLocalDate(r.week))) === week);
  await Promise.all(recs.map(r => sb.from('records').update({
    task_status: r.tasks.map(() => status),
    task_reasons: r.tasks.map(() => '')
  }).eq('id', r.id)));
  await loadRecords(); setLoading(false); render(); showToast('Estado atualizado em bloco');
};

window.setPeriod = (p, btn) => {
  dashPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderDash();
};
window.shiftDash = n => {
  if (dashPeriod === 'week') { dashWeek = new Date(dashWeek); dashWeek.setDate(dashWeek.getDate() + n * 7); }
  if (dashPeriod === 'month') { const [y,m] = dashMonth.split('-').map(Number); const nm = m+n; dashMonth = nm > 12 ? `${y+1}-01` : nm < 1 ? `${y-1}-12` : `${y}-${String(nm).padStart(2,'0')}`; }
  renderDash();
};

function getDashRecs() {
  if (dashPeriod === 'week')  return records.filter(r => fmtDate(mondayOf(parseLocalDate(r.week))) === fmtDate(mondayOf(dashWeek)));
  if (dashPeriod === 'month') return records.filter(r => r.week.startsWith(dashMonth));
  return records.filter(r => r.week.startsWith(String(dashYear)));
}

function getChartPeriods() {
  if (dashPeriod === 'week') {
    const wks = [...new Set(records.map(r => fmtDate(mondayOf(parseLocalDate(r.week)))))].sort();
    return wks.map(w => {
      const rs = records.filter(r => fmtDate(mondayOf(parseLocalDate(r.week))) === w);
      const ts = rs.flatMap(r => r.taskStatus);
      // per-person hours for tooltip
      const byPerson = {};
      rs.forEach(r => { byPerson[r.person] = (byPerson[r.person]||0) + r.hours; });
      return {
        label: `W${weekNum(parseLocalDate(w))}`,
        hours: rs.reduce((s,r) => s+r.hours, 0),
        ok: ts.length ? ts.filter(s => s==='ok').length/ts.length*100 : 0,
        byPerson
      };
    });
  }
  if (dashPeriod === 'month') {
    const mns = [...new Set(records.map(r => r.week.slice(0,7)))].sort();
    const MN = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return mns.map(m => {
      const rs = records.filter(r => r.week.startsWith(m));
      const ts = rs.flatMap(r => r.taskStatus);
      const byPerson = {};
      rs.forEach(r => { byPerson[r.person] = (byPerson[r.person]||0) + r.hours; });
      return { label: MN[parseInt(m.split('-')[1])-1], hours: rs.reduce((s,r) => s+r.hours, 0), ok: ts.length ? ts.filter(s => s==='ok').length/ts.length*100 : 0, byPerson };
    });
  }
  const rs = records.filter(r => r.week.startsWith(String(dashYear)));
  const ts = rs.flatMap(r => r.taskStatus);
  const byPerson = {};
  rs.forEach(r => { byPerson[r.person] = (byPerson[r.person]||0) + r.hours; });
  return [{ label: String(dashYear), hours: rs.reduce((s,r) => s+r.hours, 0), ok: ts.length ? ts.filter(s => s==='ok').length/ts.length*100 : 0, byPerson }];
}

// ── RANKING PODIUM ──
function renderRanking(recs) {
  const ph = {}, pt = {}, pok = {};
  recs.forEach(r => {
    ph[r.person] = (ph[r.person]||0) + r.hours;
    r.taskStatus.forEach(s => {
      pt[r.person] = (pt[r.person]||0) + 1;
      if (s === 'ok') pok[r.person] = (pok[r.person]||0) + 1;
    });
  });
  people.forEach(p => { if (!ph[p]) ph[p] = 0; });
  const ranked = Object.entries(ph).sort((a,b) => b[1]-a[1]).slice(0,3);
  if (!ranked.length) { document.getElementById('dash-ranking').innerHTML = '<p style="font-size:13px;color:#9ca3af">Sem dados</p>'; return; }

  function podiumAvatar(name, cls) {
    const url = avatarUrl(name);
    const ini = esc(initials(name));
    if (url) return `<img src="${url}" alt="${esc(name)}" class="podium-avatar ${cls}" onerror="this.outerHTML='<div class=\\'podium-avatar-init ${cls}\\'>${ini}</div>'">`;
    return `<div class="podium-avatar-init ${cls}">${ini}</div>`;
  }

  function podiumCol(rank, pos) {
    if (!rank) return '<div class="podium-col" style="opacity:.3"><div style="width:60px;height:60px;border-radius:50%;background:#e5e7eb"></div></div>';
    const [name, hours] = rank;
    const total = pt[name]||0, ok = pok[name]||0;
    const okRate = total ? Math.round(ok/total*100) : null;
    const avatarCls = `podium-${pos}`;
    return `<div class="podium-col podium-${pos}">
      ${podiumAvatar(name, avatarCls)}
      <div class="podium-name">${esc(name.split(' ')[0])}</div>
      <div class="podium-hours">${hours.toFixed(1)}h</div>
      ${okRate !== null ? `<div class="podium-ok">${okRate}% OK</div>` : ''}
      <div class="podium-block podium-block-${pos}">${pos === 1 ? '🥇' : pos === 2 ? '🥈' : '🥉'}</div>
    </div>`;
  }

  // order: 2nd, 1st, 3rd for visual podium shape
  document.getElementById('dash-ranking').innerHTML = `<div class="podium-wrap">
    ${podiumCol(ranked[1]||null, 2)}
    ${podiumCol(ranked[0], 1)}
    ${podiumCol(ranked[2]||null, 3)}
  </div>`;
}

window.renderDash = () => {
  const labels = { week: `Semana de ${fmtDate(mondayOf(dashWeek))}`, month: dashMonth, year: String(dashYear) };
  document.getElementById('dash-period-label').textContent = labels[dashPeriod];
  const periods = getChartPeriods(), nP = people.length;

  // ── Chart: Horas ──
  const hoursColors = periods.map(p => p.hours >= 39*nP ? '#22c55e' : p.hours >= 35*nP ? '#eab308' : '#ef4444');
  const hoursData = { labels: periods.map(p=>p.label), datasets: [{ data: periods.map(p=>p.hours), backgroundColor: hoursColors, borderRadius: 4, borderSkipped: false }] };
  if (chartHours) chartHours.destroy();
  chartHours = new Chart(document.getElementById('chart-hours'), {
    type: 'bar', data: hoursData,
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 }, callback: v => `${v}h` }, suggestedMax: Math.max(...periods.map(p=>p.hours), 40*nP)*1.1 }
      },
      onHover: (e, els) => {
        const tt = document.getElementById('tt-hours');
        if (!els.length) { tt.style.display='none'; return; }
        const idx = els[0].index;
        const p = periods[idx];
        const target40 = 40 * nP;
        // find people below 40h
        const under = Object.entries(p.byPerson||{}).filter(([,h]) => h < 40).sort((a,b) => a[1]-b[1]);
        let html = `<div class="tt-title">${p.label} — ${p.hours.toFixed(1)}h</div>`;
        if (under.length) {
          html += `<div style="font-size:10px;color:#fca5a5;margin-bottom:4px">Abaixo de 40h:</div>`;
          under.forEach(([name, h]) => {
            html += `<div class="tt-row"><div class="tt-dot" style="background:#ef4444"></div>${esc(name)}: ${h.toFixed(1)}h</div>`;
          });
        } else {
          html += `<div style="color:#bbf7d0;font-size:11px">Toda a equipa ≥ 40h ✓</div>`;
        }
        tt.innerHTML = html;
        tt.style.display = 'block';
        // position relative to canvas
        const rect = document.getElementById('chart-hours').getBoundingClientRect();
        const wrapRect = tt.closest('.chart-wrap').getBoundingClientRect();
        let x = e.native.clientX - wrapRect.left + 10;
        let y = e.native.clientY - wrapRect.top - 10;
        if (x + 200 > wrapRect.width) x = x - 200 - 20;
        tt.style.left = x + 'px';
        tt.style.top  = y + 'px';
      }
    }
  });
  document.getElementById('legend-hours').innerHTML = `<div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>< ${35*nP}h</div><div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>${35*nP}–${39*nP}h</div><div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>≥ ${39*nP}h</div>`;

  // ── Chart: OK Rate ──
  const okColors = periods.map(p => p.ok >= 90 ? '#22c55e' : p.ok >= 80 ? '#eab308' : '#ef4444');
  const okData = { labels: periods.map(p=>p.label), datasets: [{ data: periods.map(p=>parseFloat(p.ok.toFixed(1))), backgroundColor: okColors, borderRadius: 4, borderSkipped: false }] };
  if (chartOk) chartOk.destroy();
  chartOk = new Chart(document.getElementById('chart-ok'), {
    type: 'bar', data: okData,
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { grid: { color: '#f0f0f0' }, max: 100, ticks: { font: { size: 10 }, callback: v => `${v}%` } }
      },
      onHover: (e, els) => {
        const tt = document.getElementById('tt-ok');
        if (!els.length) { tt.style.display='none'; return; }
        const idx = els[0].index;
        const p = periods[idx];
        // per-person ok rate
        const byP = {};
        let recs;
        if (dashPeriod === 'week') {
          const wks = [...new Set(records.map(r => fmtDate(mondayOf(parseLocalDate(r.week)))))].sort();
          recs = records.filter(r => fmtDate(mondayOf(parseLocalDate(r.week))) === wks[idx]);
        } else {
          recs = getDashRecs();
        }
        recs.forEach(r => {
          if (!byP[r.person]) byP[r.person] = { ok:0, total:0 };
          r.taskStatus.forEach(s => { byP[r.person].total++; if(s==='ok') byP[r.person].ok++; });
        });
        let html = `<div class="tt-title">${p.label} — ${p.ok.toFixed(1)}% OK</div>`;
        Object.entries(byP).sort((a,b) => b[1].ok/Math.max(b[1].total,1) - a[1].ok/Math.max(a[1].total,1)).forEach(([name, d]) => {
          const r = d.total ? Math.round(d.ok/d.total*100) : 0;
          const col = r >= 90 ? '#22c55e' : r >= 80 ? '#eab308' : '#ef4444';
          html += `<div class="tt-row"><div class="tt-dot" style="background:${col}"></div>${esc(name)}: ${r}%</div>`;
        });
        tt.innerHTML = html;
        tt.style.display = 'block';
        const wrapRect = tt.closest('.chart-wrap').getBoundingClientRect();
        let x = e.native.clientX - wrapRect.left + 10;
        let y = e.native.clientY - wrapRect.top - 10;
        if (x + 200 > wrapRect.width) x = x - 200 - 20;
        tt.style.left = x + 'px';
        tt.style.top  = y + 'px';
      }
    }
  });
  document.getElementById('legend-ok').innerHTML = `<div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>< 80%</div><div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>80–90%</div><div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>≥ 90%</div>`;

  // ── Projects with breakdown ──
  const recs = getDashRecs();
  const ph = {};
  recs.forEach(r => { ph[r.project] = ph[r.project]||{}; ph[r.project][r.person] = (ph[r.project][r.person]||0) + r.hours; });
  const projEntries = Object.entries(ph).map(([p, byP]) => ({ project:p, total: Object.values(byP).reduce((a,b)=>a+b,0), byP })).sort((a,b)=>b.total-a.total);
  document.getElementById('dash-projects').innerHTML = projEntries.map((e, i) => {
    const chips = Object.entries(e.byP).sort((a,b)=>b[1]-a[1]).map(([name, h]) => {
      const avHtml = avatarTag(name, 18);
      return `<div class="pb-chip">${avHtml}<span>${esc(name)}: ${h.toFixed(1)}h</span></div>`;
    }).join('');
    return `
      <div class="proj-row" onclick="toggleProjBreakdown(${i})">
        <span>${esc(e.project)}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <strong>${e.total.toFixed(1)}h</strong>
          <span class="proj-row-info" style="font-size:11px;color:#9ca3af">▸ ${Object.keys(e.byP).length} pessoa(s)</span>
        </div>
      </div>
      <div class="proj-row-expand" id="pb-${i}">
        <div style="font-size:11px;font-weight:600;color:#6b7280;margin-bottom:6px">Breakdown por pessoa</div>
        <div class="proj-breakdown">${chips}</div>
      </div>`;
  }).join('') || '<p style="font-size:13px;color:#9ca3af">Sem dados</p>';

  // ── Ranking ──
  renderRanking(recs);

  // ── Stucks ──
  const showRes = document.getElementById('show-resolved').checked;
  const stucks = records.flatMap(r => (r.taskStatus||[]).map((st,ti) => ({ id:r.id, ti, st, person:r.person, project:r.project, week:r.week, reason:r.taskReasons[ti]||'' }))).filter(s => s.st==='stuck' || (showRes && s.reason));
  document.getElementById('stucks-body').innerHTML = stucks.length === 0
    ? `<tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:16px">Sem stucks</td></tr>`
    : stucks.map(s => `<tr><td>${s.st==='stuck'?'<span class="badge-stuck">STUCK</span>':'<span class="badge-resolved">Resolvido</span>'}</td><td>${esc(s.person)}</td><td style="font-size:12px">${esc(s.project)}</td><td style="font-size:12px">W${weekNum(parseLocalDate(s.week))}</td><td style="font-size:12px;max-width:180px">${esc(s.reason)}</td><td>${s.st==='stuck'?`<button class="btn btn-green" style="padding:4px 10px;font-size:11px" onclick="askResolve(${s.id},${s.ti})">Resolver</button>`:'–'}</td></tr>`).join('');
};

window.askResolve = (id, ti) => { pendingResolve = {id, ti}; openModal('modal-resolve'); };
window.confirmResolve = async () => {
  closeModal('modal-resolve');
  const { id, ti } = pendingResolve;
  const rec = records.find(r => r.id === id); if (!rec) return;
  const ts = [...rec.taskStatus]; ts[ti] = 'ok';
  const tr = [...rec.taskReasons]; tr[ti] = '';
  setLoading(true);
  await sb.from('records').update({ task_status: ts, task_reasons: tr }).eq('id', id);
  await loadRecords(); setLoading(false); renderDash(); showToast('Stuck resolvido');
};

window.closeModal = closeModal;
init();
</script>
</body>
</html>
